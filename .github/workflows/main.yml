name: Main

on:
    push:
        branches:
            - main

jobs:
    discover:
        runs-on: ubuntu-latest
        outputs:
            matrix: ${{ steps.set-matrix.outputs.matrix }}
        steps:
            - uses: actions/checkout@v4

            - name: Discover container directories
              id: set-matrix
              run: |
                  EXCLUDED=".git .github lib bin docs exports"
                  dirs=()
                  for d in */; do
                    name="${d%/}"
                    skip=false
                    for ex in $EXCLUDED; do [ "$name" = "$ex" ] && skip=true; done
                    $skip || dirs+=("$name")
                  done
                  echo "matrix=$(jq -cn '$ARGS.positional' --args "${dirs[@]}")" >> "$GITHUB_OUTPUT"

    lint:
        needs: discover
        runs-on: ubuntu-latest
        strategy:
            matrix:
                container: ${{ fromJson(needs.discover.outputs.matrix) }}
        steps:
            - uses: actions/checkout@v4

            - name: Shellcheck
              run: shellcheck lib/build-utils.sh

            - name: Install hadolint
              run: |
                  curl -sSL https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64 \
                    -o /usr/local/bin/hadolint
                  chmod +x /usr/local/bin/hadolint

            - name: Hadolint
              run: hadolint ${{ matrix.container }}/Dockerfile

    build-and-push:
        needs: [ discover, lint ]
        runs-on: ubuntu-latest
        strategy:
            matrix:
                container: ${{ fromJson(needs.discover.outputs.matrix) }}
        env:
            CONTAINER: ${{ matrix.container }}
            DOCKER_USERNAME: ${{ vars.DOCKER_USERNAME }}
        steps:
            - uses: actions/checkout@v4

            - name: Install skopeo
              run: sudo apt-get update && sudo apt-get install -y skopeo

            - name: Build if changed
              id: build
              run: |
                  . lib/build-utils.sh
                  if needs_build "$CONTAINER" "$DOCKER_USERNAME"; then
                    do_build "$CONTAINER" "$DOCKER_USERNAME"
                    echo "BUILD_NEEDED=true" >> "$GITHUB_ENV"
                  else
                    echo "BUILD_NEEDED=false" >> "$GITHUB_ENV"
                  fi

            - name: Trivy scan
              if: env.BUILD_NEEDED == 'true'
              uses: aquasecurity/trivy-action@0.30.0
              with:
                  image-ref: ${{ vars.DOCKER_USERNAME }}/${{ matrix.container }}:latest
                  format: json
                  output: trivy-report-${{ matrix.container }}.json
                  exit-code: "0"

            - name: Generate SBOM
              if: env.BUILD_NEEDED == 'true'
              uses: aquasecurity/trivy-action@0.30.0
              with:
                  image-ref: ${{ vars.DOCKER_USERNAME }}/${{ matrix.container }}:latest
                  format: cyclonedx
                  output: sbom-${{ matrix.container }}.cdx.json
                  exit-code: "0"

            - name: Docker push
              if: env.BUILD_NEEDED == 'true'
              run: |
                  echo "${{ secrets.DOCKER_HUB_TOKEN }}" | docker login -u "$DOCKER_USERNAME" --password-stdin
                  . lib/build-utils.sh
                  do_push "$CONTAINER" "$DOCKER_USERNAME"

            - name: Upload artifacts
              if: env.BUILD_NEEDED == 'true'
              uses: actions/upload-artifact@v4
              with:
                  name: artifacts-${{ matrix.container }}
                  path: |
                      trivy-report-${{ matrix.container }}.json
                      sbom-${{ matrix.container }}.cdx.json
                  retention-days: 90

    release:
        needs: [ discover, build-and-push ]
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Download all artifacts
              uses: actions/download-artifact@v4
              with:
                  path: release-assets
                  merge-multiple: true

            - name: Check if any artifacts exist
              id: check
              run: |
                  count=$(find release-assets -type f 2>/dev/null | wc -l)
                  echo "count=$count" >> "$GITHUB_OUTPUT"

            - name: Create release
              if: steps.check.outputs.count != '0'
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  TAG="v$(date -u '+%Y.%m.%d-%H%M')"
                  gh release create "$TAG" \
                    --repo "$GITHUB_REPOSITORY" \
                    --title "$TAG" \
                    --notes "Automated release from main build on $(date -u '+%Y-%m-%d %H:%M UTC')" \
                    release-assets/*
