inputSet:
  name: main-pipeline-input-set.yaml
  identifier: mainpipelineinputsetyaml
  orgIdentifier: default
  projectIdentifier: default_project
  pipeline:
    identifier: mainpipeline
    stages:
      - stage:
          identifier: BuildAndPush
          type: CI
          spec:
            execution:
              steps:
                - stepGroup:
                    identifier: TrivyScanAndUpload
                    template:
                      templateInputs:
                        spec:
                          inputs:
                            - name: always_run
                              value: "false"
                            - name: docker_username
                              value: <+project.variables.dockeruser>
                            - name: minio_url
                              value: <+project.variables.miniourl>
                            - name: minio_user
                              value: <+project.variables.miniouser>
