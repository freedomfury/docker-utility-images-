template:
  name: trivy-scan-upload
  identifier: trivyscanupload
  versionLabel: "1"
  type: StepGroup
  projectIdentifier: default_project
  orgIdentifier: default
  spec:
    stageType: CI
    variables:
      - name: always_run
        type: String
        value: <+input>
      - name: docker_username
        type: String
        value: <+input>
      - name: minio_url
        type: String
        value: <+input>
      - name: minio_user
        type: String
        value: <+input>
    steps:
      - step:
          type: Run
          name: Trivy Scan
          identifier: TrivyScan
          spec:
            connectorRef: dockerdefault
            image: aquasec/trivy:latest
            shell: Sh
            envVariables:
              HA_CONTAINER: <+matrix.container>
              HA_ALWAYS_RUN: <+stepGroup.variables.always_run>
              HA_DOCKER_USERNAME: <+stepGroup.variables.docker_username>
            command: |-
              STATE_FILE="${HARNESS_WORKSPACE:-.}/build-state.env"
              REPORT_FILE="${HARNESS_WORKSPACE:-.}/trivy-report-${HA_CONTAINER}.json"
              if [ "$HA_ALWAYS_RUN" = "false" ]; then
                . "$STATE_FILE"
                if [ "$BUILD_NEEDED" != "true" ]; then
                  echo "[$HA_CONTAINER] Skipping Trivy scan, no build performed."
                  exit 0
                fi
              fi
              trivy image \
                --exit-code 0 \
                --format json \
                --output "$REPORT_FILE" \
                "$HA_DOCKER_USERNAME/$HA_CONTAINER:latest"
              echo "[$HA_CONTAINER] Trivy scan complete."
      - step:
          type: Run
          name: Upload Trivy Report
          identifier: UploadTrivyReport
          spec:
            connectorRef: dockerdefault
            image: minio/mc:latest
            shell: Sh
            envVariables:
              HA_CONTAINER: <+matrix.container>
              HA_ALWAYS_RUN: <+stepGroup.variables.always_run>
              HA_MINIO_URL: <+stepGroup.variables.minio_url>
              HA_MINIO_USER: <+stepGroup.variables.minio_user>
              HA_MINIO_PASS: <+secrets.getValue("minio-pass")>
            command: |-
              STATE_FILE="${HARNESS_WORKSPACE:-.}/build-state.env"
              REPORT_FILE="${HARNESS_WORKSPACE:-.}/trivy-report-${HA_CONTAINER}.json"
              if [ "$HA_ALWAYS_RUN" = "false" ]; then
                . "$STATE_FILE"
                if [ "$BUILD_NEEDED" != "true" ]; then
                  echo "[$HA_CONTAINER] Skipping upload, no build performed."
                  exit 0
                fi
              fi
              mc alias set minio "$HA_MINIO_URL" "$HA_MINIO_USER" "$HA_MINIO_PASS"
              mc cp "$REPORT_FILE" \
                "minio/global/harness/trivy/${HA_CONTAINER}/report.json"
              echo "[$HA_CONTAINER] Trivy report uploaded."
              cat "$REPORT_FILE"
              PRESIGNED_URL=$(mc share download --expire 168h "minio/global/harness/trivy/${HA_CONTAINER}/report.json" | grep -oP 'Share: \K\S+')
              echo "##[artifact] url=$PRESIGNED_URL"
