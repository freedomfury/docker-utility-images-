template:
  name: trivy-scan-upload
  identifier: trivyscanupload
  versionLabel: "1"
  type: StepGroup
  projectIdentifier: default_project
  orgIdentifier: default
  spec:
    stageType: CI
    inputs:
      - name: always_run
        type: String
        default: "true"
      - name: docker_username
        type: String
      - name: minio_url
        type: String
      - name: minio_user
        type: String
    steps:
      - step:
          type: Run
          name: Trivy Scan
          identifier: TrivyScan
          spec:
            connectorRef: dockerdefault
            image: aquasec/trivy:latest
            shell: Sh
            envVariables:
              HA_CONTAINER: <+matrix.container>
              HA_ALWAYS_RUN: <+inputs.always_run>
              HA_DOCKER_USERNAME: <+inputs.docker_username>
              HA_DOCKER_USERNAME_FALLBACK: <+project.variables.dockeruser>
            command: |-
              STATE_FILE="${HARNESS_WORKSPACE:-.}/build-state.env"
              REPORT_FILE="${HARNESS_WORKSPACE:-.}/trivy-report-${HA_CONTAINER}.json"
              if [ -z "$HA_DOCKER_USERNAME" ] || [ "$HA_DOCKER_USERNAME" = "null" ]; then
                HA_DOCKER_USERNAME="$HA_DOCKER_USERNAME_FALLBACK"
              fi
              if [ "$HA_ALWAYS_RUN" = "false" ]; then
                . "$STATE_FILE"
                if [ "$BUILD_NEEDED" != "true" ]; then
                  echo "[$HA_CONTAINER] Skipping Trivy scan, no build performed."
                  exit 0
                fi
              fi
              trivy image \
                --exit-code 0 \
                --format json \
                --output "$REPORT_FILE" \
                "$HA_DOCKER_USERNAME/$HA_CONTAINER:latest"
              echo "[$HA_CONTAINER] Trivy scan complete."
      - step:
          type: Run
          name: Upload Trivy Report
          identifier: UploadTrivyReport
          spec:
            connectorRef: dockerdefault
            image: minio/mc:latest
            shell: Sh
            envVariables:
              HA_CONTAINER: <+matrix.container>
              HA_ALWAYS_RUN: <+inputs.always_run>
              HA_MINIO_URL: <+inputs.minio_url>
              HA_MINIO_USER: <+inputs.minio_user>
              HA_MINIO_URL_FALLBACK: <+project.variables.miniourl>
              HA_MINIO_USER_FALLBACK: <+project.variables.miniouser>
              HA_MINIO_PASS: <+secrets.getValue("minio-pass")>
            command: |-
              STATE_FILE="${HARNESS_WORKSPACE:-.}/build-state.env"
              REPORT_FILE="${HARNESS_WORKSPACE:-.}/trivy-report-${HA_CONTAINER}.json"
              if [ -z "$HA_MINIO_URL" ] || [ "$HA_MINIO_URL" = "null" ]; then
                HA_MINIO_URL="$HA_MINIO_URL_FALLBACK"
              fi
              if [ -z "$HA_MINIO_USER" ] || [ "$HA_MINIO_USER" = "null" ]; then
                HA_MINIO_USER="$HA_MINIO_USER_FALLBACK"
              fi
              if [ "$HA_ALWAYS_RUN" = "false" ]; then
                . "$STATE_FILE"
                if [ "$BUILD_NEEDED" != "true" ]; then
                  echo "[$HA_CONTAINER] Skipping upload, no build performed."
                  exit 0
                fi
              fi
              echo "[DEBUG] HA_CONTAINER=${HA_CONTAINER:-<empty>}"
              echo "[DEBUG] HA_MINIO_URL=${HA_MINIO_URL:-<empty>}"
              echo "[DEBUG] HA_MINIO_USER=${HA_MINIO_USER:-<empty>}"
              if [ -z "$HA_MINIO_URL" ] || [ "$HA_MINIO_URL" = "null" ]; then
                echo "[ERROR] HA_MINIO_URL is empty or null. Check StepGroup template input mapping for minio_url and project variable values."
                exit 1
              fi
              mc alias set minio "$HA_MINIO_URL" "$HA_MINIO_USER" "$HA_MINIO_PASS"
              mc cp "$REPORT_FILE" \
                "minio/global/harness/trivy/${HA_CONTAINER}/report.json"
              echo "[$HA_CONTAINER] Trivy report uploaded."
              cat "$REPORT_FILE"
              PRESIGNED_URL=$(mc share download --expire 168h "minio/global/harness/trivy/${HA_CONTAINER}/report.json" | grep -oP 'Share: \K\S+')
              echo "##[artifact] url=$PRESIGNED_URL"
