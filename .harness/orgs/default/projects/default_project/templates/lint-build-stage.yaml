template:
  name: lint-build-stage
  identifier: lintbuildstage
  versionLabel: "1"
  type: Stage
  projectIdentifier: default_project
  orgIdentifier: default
  spec:
    stageType: CI
    type: CI
    spec:
      cloneCodebase: true
      caching:
        enabled: true
        override: true
      buildIntelligence:
        enabled: false
      platform:
        os: Linux
        arch: Amd64
      runtime:
        type: Docker
        spec: {}
      execution:
        steps:
          - step:
              type: Run
              name: Matrix Check and Shellcheck
              identifier: MatrixCheckAndShellcheck
              spec:
                connectorRef: dockerdefault
                image: koalaman/shellcheck-alpine:stable
                shell: Sh
                command: |-
                  sh bin/check-matrix.sh
                  shellcheck lib/build-utils.sh bin/check-matrix.sh
          - step:
              type: Run
              name: Lint
              identifier: Lint
              spec:
                connectorRef: dockerdefault
                image: hadolint/hadolint:latest
                shell: Bash
                envVariables:
                  HA_CONTAINER: <+matrix.container>
                command: hadolint "$HA_CONTAINER/Dockerfile"
